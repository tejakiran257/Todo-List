<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTodo</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="card">

        <div class="logo">
            ✓ SmartTodo
        </div>

        <h1>Please Enter Your Name</h1>

        <input
            type="text"
            id="name"
            placeholder="Enter your name">

        <button onclick="nextPage()">
            Next →
        </button>

    </div>

    <script>

        function nextPage(){

            let name =
                document.getElementById("name")
                .value
                .trim();

            if(name === ""){

                alert(
                    "Please enter your name"
                );

                return;
            }

            localStorage.setItem(
                "username",
                name
            );

            window.location.href =
                "todo.html";
        }

        document
        .getElementById("name")
        .addEventListener(
            "keypress",
            function(event){
                if(event.key === "Enter"){

                    nextPage();
                }

            }
        );

    </script>

</body>
</html>
